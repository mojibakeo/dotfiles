"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$hostname\
$shlvl\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$dart\
$golang\
$java\
$nodejs\
$python\
$conda\
$php\
$rust\
$memory_usage\
$env_var\
$custom\
$cmd_duration\
$jobs\
$battery\
$time\
$status\
$character"""

[character]
success_symbol = "[→](bold green)"
error_symbol = "[←](bold red)"

[directory]
style = "bold cyan"

[conda]
format = '[$symbol$environment](cyan) '
